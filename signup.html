<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up – PrithviNet</title>
  <link rel="stylesheet" href="assets/css/custom.css"/>
  <style>
    body { background: linear-gradient(135deg, #0D1B2A 0%, #071526 50%, #0D2137 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-container { width: 100%; max-width: 500px; }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo .logo-icon { width: 56px; height: 56px; border-radius: 14px; background: linear-gradient(135deg, #00897B, #4DB6AC); display: flex; align-items: center; justify-content: center; font-size: 1.6rem; margin: 0 auto 12px; }
    .auth-logo h1 { font-size: 1.5rem; color: #fff; margin-bottom: 4px; }
    .auth-logo p { font-size: 0.83rem; color: rgba(255,255,255,0.5); }
    .auth-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 32px; backdrop-filter: blur(20px); }
    .auth-card h2 { font-size: 1.25rem; color: #fff; margin-bottom: 4px; }
    .auth-card .subtitle { font-size: 0.83rem; color: rgba(255,255,255,0.5); margin-bottom: 24px; }
    .form-label { color: rgba(255,255,255,0.65); }
    .form-control { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); color: #fff; }
    .form-control:focus { background: rgba(255,255,255,0.1); border-color: #00897B; }
    .form-control::placeholder { color: rgba(255,255,255,0.3); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
    .role-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 6px; }
    .role-option { border: 1.5px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px 10px; cursor: pointer; text-align: center; transition: all 0.2s; positionrelative; }
    .role-option:hover { border-color: rgba(0,137,123,0.5); background: rgba(0,137,123,0.1); }
    .role-option.selected { border-color: #00897B; background: rgba(0,137,123,0.2); }
    .role-option input { position: absolute; opacity: 0; }
    .role-option .role-emoji { font-size: 1.4rem; display: block; margin-bottom: 4px; }
    .role-option span { font-size: 0.75rem; color: rgba(255,255,255,0.65); font-weight: 500; }
    .auth-footer { text-align: center; margin-top: 18px; font-size: 0.83rem; color: rgba(255,255,255,0.4); }
    .auth-footer a { color: #4DB6AC; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">
      <div class="logo-icon">🌿</div>
      <h1>PrithviNet</h1>
      <p>Create your account</p>
    </div>
    <div class="auth-card">
      <h2>Join PrithviNet 🌿</h2>
      <p class="subtitle">Create your account and start monitoring today</p>
      
      <form id="signup-form" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Full Name *</label>
            <input class="form-control" type="text" id="name" placeholder="Rajesh Kumar" required/>
            <div class="form-error" id="name-error">Name is required.</div>
          </div>
          <div class="form-group">
            <label class="form-label">Region</label>
            <input class="form-control" type="text" id="region" placeholder="Maharashtra"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address *</label>
          <input class="form-control" type="email" id="email" placeholder="you@example.com" required/>
          <div class="form-error" id="email-error">Valid email required.</div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Password *</label>
            <input class="form-control" type="password" id="password" placeholder="Min. 6 characters" required/>
            <div class="form-error" id="pwd-error">Min. 6 characters required.</div>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password *</label>
            <input class="form-control" type="password" id="confirm-password" placeholder="Re-enter password" required/>
            <div class="form-error" id="cpwd-error">Passwords don't match.</div>
          </div>
        </div>
        
        <div class="form-group">
          <label class="form-label">Select Your Role *</label>
          <div class="role-grid">
            <label class="role-option" onclick="selectRole('citizen',this)">
              <input type="radio" name="role" value="citizen" checked/>
              <span class="role-emoji">🌱</span><span>Citizen</span>
            </label>
            <label class="role-option" onclick="selectRole('industry_user',this)">
              <input type="radio" name="role" value="industry_user"/>
              <span class="role-emoji">🏭</span><span>Industry User</span>
            </label>
            <label class="role-option" onclick="selectRole('monitoring_team',this)">
              <input type="radio" name="role" value="monitoring_team"/>
              <span class="role-emoji">🔬</span><span>Monitoring</span>
            </label>
            <label class="role-option" onclick="selectRole('regional_officer',this)">
              <input type="radio" name="role" value="regional_officer"/>
              <span class="role-emoji">🏛️</span><span>Officer</span>
            </label>
          </div>
        </div>

        <div id="signup-error" class="form-error" style="margin-bottom:12px;font-size:0.85rem;text-align:center"></div>
        <button class="btn btn-primary btn-lg w-full" type="submit" id="btn-signup">
          <span id="btn-text">Create Account</span>
          <div class="spinner spinner-sm" id="btn-spinner" style="display:none"></div>
        </button>
      </form>
    </div>
    <div class="auth-footer">Already have an account? <a href="login.html">Sign in</a></div>
  </div>

    <script src="./assets/js/app.js"></script>
  <script>
    Theme.init(); Toast.init();
    if (Auth.isLoggedIn()) window.location.href = './dashboard.html';

    document.querySelector('.role-option').classList.add('selected');

    function selectRole(val, el) {
      document.querySelectorAll('.role-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
    }

    document.getElementById('signup-form').addEventListener('submit', async e => {
      e.preventDefault();
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm-password').value;
      const role     = document.querySelector('input[name="role"]:checked')?.value || 'citizen';
      const region   = document.getElementById('region').value.trim();
      let valid = true;

      if (!name) { document.getElementById('name-error').classList.add('visible'); valid = false; }
      else document.getElementById('name-error').classList.remove('visible');
      if (!email || !email.includes('@')) { document.getElementById('email-error').classList.add('visible'); valid = false; }
      else document.getElementById('email-error').classList.remove('visible');
      if (!password || password.length < 6) { document.getElementById('pwd-error').classList.add('visible'); valid = false; }
      else document.getElementById('pwd-error').classList.remove('visible');
      if (password !== confirm) { document.getElementById('cpwd-error').classList.add('visible'); valid = false; }
      else document.getElementById('cpwd-error').classList.remove('visible');
      if (!valid) return;

      const btn = document.getElementById('btn-signup');
      const btnText = document.getElementById('btn-text');
      const spinner = document.getElementById('btn-spinner');
      btn.disabled = true; btnText.textContent = 'Creating...'; spinner.style.display = 'inline-block';

      const res = await API.post('signup', { name, email, password, role, region });
      btn.disabled = false; btnText.textContent = 'Create Account'; spinner.style.display = 'none';

      if (res.ok && res.data.success) {
        Toast.success('Account created! Welcome to PrithviNet!');
        setTimeout(() => {
          if (role === 'citizen') window.location.href = './citizen.html';
          else window.location.href = './dashboard.html';
        }, 800);
      } else {
        const errEl = document.getElementById('signup-error');
        errEl.textContent = res.data && res.data.error ? res.data.error : 'Registration failed. Please try again.';
        errEl.classList.add('visible');
      }
    });
  </script>
</body>
</html>
